<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 100" width="100%" height="100%">
  <defs>
    <!-- Google Font Import -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@800;900&amp;display=swap');
      .brand-text {
        font-family: 'Montserrat', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-weight: 900;
        font-size: 38px;
        letter-spacing: -0.5px;
      }
    </style>
  </defs>

  <!-- Building Icon (Abstract 3 Towers Silhouette) -->
  <g transform="translate(10, 0)">
    <!-- Base Line (White) -->
    <line x1="15" y1="88" x2="85" y2="88" stroke="white" stroke-width="3.5" stroke-linecap="round"/>
    
    <!-- Left Tower (White Outline) -->
    <path d="M 25 88 L 25 44 L 42 34 L 42 88" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Left Tower Windows -->
    <rect x="31" y="48" width="4" height="8" rx="1.5" fill="white"/>
    <rect x="31" y="62" width="4" height="8" rx="1.5" fill="white"/>
    <rect x="31" y="76" width="4" height="8" rx="1.5" fill="white"/>

    <!-- Middle Tower (White Outline) -->
    <path d="M 42 88 L 42 22 L 59 10 L 59 88" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Middle Tower Windows -->
    <rect x="48" y="24" width="4" height="10" rx="1.5" fill="white"/>
    <rect x="48" y="40" width="4" height="10" rx="1.5" fill="white"/>
    <rect x="48" y="56" width="4" height="10" rx="1.5" fill="white"/>
    <rect x="48" y="72" width="4" height="10" rx="1.5" fill="white"/>

    <!-- Right Tower (White Outline) -->
    <path d="M 59 88 L 59 48 L 76 58 L 76 88" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <!-- Right Tower Windows -->
    <rect x="65" y="54" width="4" height="8" rx="1.5" fill="white"/>
    <rect x="65" y="66" width="4" height="8" rx="1.5" fill="white"/>
    <rect x="65" y="78" width="4" height="8" rx="1.5" fill="white"/>
  </g>

  <!-- Wordmark Text -->
  <text x="110" y="62" class="brand-text">
    <tspan fill="white">CONDO</tspan><tspan fill="#cca23c">SMART</tspan>
  </text>
</svg>
